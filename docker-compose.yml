version: '3.8'

services:
  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semantic-search-api
    ports:
      - "8000:8000"
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ./gmm_model.pkl:/app/gmm_model.pkl
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - semantic-search

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: semantic-search-frontend
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      - ./gmm_model.pkl:/app/gmm_model.pkl
      - ./streamlit_app.py:/app/streamlit_app.py
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - semantic-search

  # Data Ingestion Service (run once)
  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: semantic-search-ingest
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
      - ${DATASET_PATH:-./data/20_newsgroups}:/data/20_newsgroups:ro
    # Mount the gmm_model.pkl to persist after ingestion
    volumes:
      - ./gmm_model.pkl:/app/gmm_model.pkl
    command: >
      sh -c "python ingest_local_dataset.py"
    restart: "no"
    networks:
      - semantic-search

networks:
  semantic-search:
    driver: bridge


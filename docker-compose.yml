version: '3.8'

services:
  api:
    build: .
    container_name: semantic-search-api
    ports:
      - "8000:8000"
    environment:
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    command: python -m uvicorn src.app:app --host 0.0.0.0 --port 8000
    networks:
      - semantic-search

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: semantic-search-frontend
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    depends_on:
      - api
    volumes:
      - ./:/app
    command: streamlit run streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - semantic-search

networks:
  semantic-search:
    driver: bridge
